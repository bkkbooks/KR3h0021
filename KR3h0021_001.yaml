body:
  text: 畫史宋米芾撰杜甫詩謂薛少保惜哉功各迕但見書畫傳甫老儒汲汲於功名豈不知固有時命殆是平生寂寥所慕嗟乎五王之功業尋為女子笑而少保之筆精墨妙摹印亦廣石泐則重刻絹破則重補又假以行者何可數也然則才子鑒士寳鈿瑞錦繅襲數十以為珍玩囘視五王之煒煒皆糠粃埃壒奚足道哉雖孺子知其不逮少保逺甚明白余故題所得蘇氏薛稷二鶴云遼海未稀顧螻蟻仰霄孤唳留清耳從容雅步在庭除浩蕩閒心存萬里椉軒未失入佳談寫真不妄傳詩史好事心靈自不凡臭穢功名皆一戯武功中令應天人束髪寮陽侍帝晨連城照乘不保寳黄圖孔誥悉珍真百齡生我欲公起九原蕭蕭松薿薿得公遺物非不多賞物懐賢心不已其後以帖易與蒋長源字仲永吾書畫友也余平生嗜此老矣此外無足為者甞作詩云棐几延毛子明牕館墨卿功名皆一戯未覺負平生九原不可作漫呼杜老曰杜二酹汝一巵酒愧汝在不能從我遊也故敘平生所覩以示子孫題曰畫史識者為予增廣耳目也晉畫顧凱之維摩天女飛仙在余家女史箴横卷在劉有方家已上筆彩生動髭髮秀潤太宗實錄載購得顧筆一卷今士人家收得唐摹顧筆列女圖至刻板作扇皆是三寸餘人物與劉氏女史箴一同吾家維摩天女長二尺名畫記所謂小身維摩也戴逵觀音在余家天男相無髭皆貼金六朝畫蘇氏古賢像十人一卷衣紋自非晉筆蔣長源字仲永收宣王姜后免冠諫圖宣王白帽此六朝冠也王戎象元在余家易李邕帖與呂端問已上皆假顧凱之筆元以懐素帖易于王詵字晉卿家梁武帝翻經象在宗室仲忽處亦假顧筆天帝釋象在蘇泌家皆張僧繇筆也張筆天女宮女面短而艶顧乃深靚為天人相武帝作居士服反脣露齒宮女四人擎花後四武士持戈劎髮如神也余家收英布象類六朝時石刻唐畫五代附國朝唐初畫髙鳯并梁鴻故事横卷在蔡堪字道勝家唐太宗步輦圖有李徳裕題跋人後脚差是閻令畫真筆今在宗室仲爰君發家道徳經一卷出相間不知何人畫絹本字大小不匀真褚遂良書在范相堯夫家與馮京當世家西昇經不同雖有裴度柳公權跋非閻令畫褚筆唐人自不鑒爾蘇氏種𤓰圖絶畫故事蜀人多作此等畫工甚非閻立本筆立本畫皆著色而細鎖銀作月色布地今人收得便謂之李將軍思訓皆非也江南李主多有之以内合同印集賢院印印之葢收逺物或是珍貢王維畫小輞川摹本筆細在長安李氏人物好此定是真若比世俗所謂王維全不類或傳宜興楊氏本上摹得張修字誠之少卿家有辟支佛下畫王維仙桃中黄服合掌頂禮乃是自寫真與世所傳闗中十大弟子真法相似是真筆世俗以蜀中畫騾綱圖劎門闗圖為王維甚衆又多以江南人所畫雪圖命為王維但見筆清秀者即命之如蘇之純家所收魏武讀碑圖亦命之維李冠卿家小卷亦命之維與讀碑圖一同今在余家長安李氏雪圖與孫載道字積中家雪圖一同命之為王維也其他貴侯家不可勝數諒非如是之衆也文彦博太師小輞川拆下唐跋自連真還李氏一日同出坐客皆言太師者真唐張彦逺名畫記云類道子又云雲峯石色絶迹天機筆思縱横參於造化孫氏圖僅有之餘未見此趣蘇軾子瞻家收吳道子畫佛及侍者誌公十餘人破碎甚而當面一手精彩動人㸃不加墨口淺深暈成故最如活王防字元規家二天王皆是吳之入神畫行筆磊落揮霍如蓴菜條圜潤折算方圓凹凸装色如新與子瞻者一同李公麟字伯時家天王雖佳細弱無氣格乃其弟子輩作貴侯家所收率皆此類也宗室令穰字大年處天蓬亦真吳筆周穜字仁熟家大悲亦真今人得佛則命為吳未見真者唐人以吳集大成面為格式故多似尤難鑒定余白首止見四軸真筆也世俗見馬即命為曹韓韋見牛即命為韓滉戴嵩甚可笑唐名手衆未易定惟薛道祖紹彭家九馬圖合杜甫詩是真曹筆餘唐人大抵不相逺也又金陵有唐人韓滉畫牛今人皆命為戴葢差瘦也馬佳本所見髙公繪字君素二馬一齕草一嘶王詵家二馬相咬是一本後人分開賣蘇激字志東家三匹王元規家一匹宗室令穰家五匹劉涇字巨濟家三匹皆筆法相似並唐人妙手也劉所收白子母牛王仲修字敏夫家黑牛令穰家黑牛皆命為戴甚相似貴侯家多不同皆命為戴不可勝數張退傅丞相孫徳淑收仁宗畫黑猿上有小御寳旁一印胡蘆王素字畫竒甚唐畫張志和顔魯公樵青圖在朱長文字伯原家無名人畫甚佳今人以無名命為有名不可勝數故諺云牛即戴嵩馬即韓幹鶴即杜荀象即章得也山水李成只見二本一松石一山水四軸松石皆出盛文肅家今在余齋山水在蘇州寳月大師處秀甚不凡松勁挺枝葉鬱然有隂荆楚小木無冗筆不作龍虵鬼神之状今世貴侯所收大圖猶如顔柳書藥牌形貌似爾無自然皆凡俗林木怒張松榦枯瘦多節小木如柴無生意成身為光祿丞第進士子祐為諫議大夫孫宥為待制贈成金紫光祿大夫使其是凡工衣食所仰亦不如是之多皆俗手假名余欲為無李論巨然師董源今世多有本嵐氣清潤布景得天真多巨然少年時多作礬頭老年平淡趣髙劉道士亦江南人與巨然同師巨然畫則僧在主位劉畫則道士在主位以此為别董源平淡天真多唐無此品在畢宏上近世神品格髙無與比也峯巒出沒雲霧顯晦不装巧趣皆得天真嵐色鬱蒼枝榦勁挺咸有生意溪橋漁浦洲渚掩映一片江南也闗仝人物俗石木出於畢宏有枝無榦張友正家收古柏一株枝枝如龍虵糺結甚異石亦皺澀不凡題為韋侯平生收畫後多歸王大抵牛馬人物一模便似山水摹皆不成山水心匠自得處髙也滕昌祐邊鸞徐熈徐崇嗣花皆如生黄筌惟蓮差勝雖富艶皆俗李王山水唐希雅黄筌之倫翎毛小筆人收甚衆好事家必五七本不足深論李瑋公炤自言收李成八幅此特以氣與好事相尚爾宗室仲忽字周臣收孫可元笠澤垂釣圖亦不俗然世無可元筆又收唐道徳經一卷人物三寸許皆如吳畫潤州節推荘鼎字節之青州人收麻紙爾雅圖衣冠人物與蘇氏一同王球䕫玉收西域圖謂之閻令畫褚遂良書與馮京家同假名耳蒋長源字永仲家周昉三楊圖馮京當世家横卷皆入神蘇州丁氏五星圖宗室叔盎字伯充家金星一小幀並真迹也宗少文一筆畫唐人摹絹本在劉季孫家故蘇太簡物薛稷鶴在蘇之孟家北史人物衣冠乘馬甚古亦在蘇之孟家題云曹将軍也徐熈大小折枝吾家亦有士人家往往見之翎毛之倫非雅玩故不錄桃一大枝謂之滿堂春色在余家李公麟家展子䖍朔方行小人物甚佳韓馬破裂四足如涉水中皆南唐文房物宗室仲爰字君發收唐畫陶淵明歸去来其作廬山有趣不俗楊崇字之損收唐畫村田踏歌樂上題廣政年入御府人物亦佳凡收畫必先收唐希雅徐熈等雪圖巨然或范寛山水圖齊整相對者装堂遮壁乃於其上旋旋掛名筆絹素大小可相當成對者又漸漸掛無對者葢古畫大小不齊鋪掛不端正若晉筆須第二重掛唐筆為襯乃可掛也許道寧不可用模人畫太俗也余家顧淨名天女長二尺五應名畫記所述之數唐鏤牙軸紫錦装褾李公麟見之賞愛不已親琢白玉牌鼎銘古篆虎頭金粟字皆碾雲鶴以結縁也戴逵觀音亦在余家家山乃逵故宅其女捨宅為寺寺僧傳得其相天男端靜舉世所覩觀音作天女相者皆不及也名畫記云自漢始有佛至逵始大備也古畫若得之不脱不須背褾若不佳換褾一次背一次壞屢更矣深可惜葢人物精神髮彩花之穠艶蜂蝶只在約略濃淡之間一經背多或失之也蔡駰子駿家收老子度闗山水林石車從闗令尹喜皆竒古老子乃作端正塑像戴翠色蓮華冠手持碧玉如意此葢唐為之祖故不敢畫其真容漢畫老子于蜀郡石室有聖人氣象想去古近當是也仲爰收巨然半幅横軸一風雨景一皖公山天柱峰圖清潤秀拔林路縈囘真佳製也余家董源霧景横披全幅山骨隠顯林梢出沒意趣髙古余家所收李成至李冠卿大扇愛之不已為天下之冠既購得之背於真州昭宣使宋用臣自舒州召還見之太息云慈聖光獻太后於上温凊小次盡購李成畫貼成屏風以上所好至輒玩之因吳丞相冲卿夫人入朝太后使引辨真偽成之孫女也内以四幀為真拆奉上别購補之敕用臣背於内東門正與此類因語泫然囑吾愛惜余亦甚珍之及得盛文肅家松石片幅如紙幹挺可為隆棟枝茂凄然生隂作節處不用墨圏下一大㸃以通身淡筆空過乃如天成對面皴石圓潤突起至坡峰落筆與石脚及水中一石相平下用淡墨作水相準乃是一磧直入水中不若世俗所效直斜落筆下更無地又無水勢如飛空中使妄評之人以李成無脚葢未見真耳劉涇自以李成真筆多於是出示之乃良乆曰此必成師也唐希雅作林竹韵清楚但不合多作禽鳥又作棘林間戰筆小竹非善是效其主李重光耳錦峰白蓮居士又稱鍾峰隠居又稱鍾峰隠者皆李重光畫自題號意是鍾山隠居耳每自畫必題曰鍾隠筆上著内殿圖書之印及押用内合同集賢院黑印有此印者是典於文房物也内合同乃其璽唐室皆用内合同為御印至梁髙祖始用御前之印也錢氏以内院倣之封函曰制姓名内曰制公某人可某官官上用此印日月用國印今人絶不畫故事則為之人又不考古衣冠皆使人發笑古人皆云某圖是故事也蜀人有晉唐餘風國初已前多作之人物不過一指雖乏氣格亦秀整林木皆用重色清潤可喜今絶不復見矣范寛師荆浩浩自稱洪谷子王詵甞以二畫見送題勾龍爽畫因重背入水於左邊石上有洪谷子荆浩筆字在合綠色抹石之下非後人作也然全不似寛後數年丹徒僧房有一軸山水與浩一同而筆乾不圜於瀑水邊題華原范寛乃是少年所作却以常法較之山頂好作宻林自此趨枮老水際作突兀大石自此趨勁硬信荆之弟子也於是以一畫易之收以示鑒者荆浩畫畢仲愈將叔處有一軸叚緘家有横披然未見卓然驚人者寛固青於藍又云李成師荆浩未見一筆相似師闗仝則葉樹相似闗仝真迹見二十本范寛見三十本其徒甚多滕昌祐邊鸞各見十本丘文播花木見三十本祝夢松雪竹見五本巨然劉道士各見十本餘董源見五本李成真見兩本偽見三百本徐熈崇嗣花果見三十本黄筌居寀居實見百本李重光見二十本偽吳生見三百本闗中小孟人謂之今吳生以壁畫筆上絹素一一如刀劃道子界墨訖則去弟子装之色葢本筆再添而成唯恐失真故齊如劃小孟遂只見壁畫不見其真至於㸃睛皆用濃墨愈光愈失神彩不活又畫人面耳邊地濶口鼻眼相近武宗元亦然以吳生畫其手多異然本非用意各執一物理自不同宗元乃為過海天王二十餘身各各髙呈似其手各作一樣一披之猶一羣打令鬼神不覺大笑俗以為工也李公麟病右手三年余始畫以李甞師吳生終不能去其氣余乃取顧髙古不使一筆入吳生又李筆神彩不髙余為目睛面文骨木自是天性非師而能以俟識者唯作古忠賢象也東丹王胡瓌蕃馬見七八本雖好非齋室清玩余昔購丁氏蜀人李昇山水一幀細秀而潤上危峰下橋涉中瀑泉松有三十餘株小字題松身曰蜀人李昇以易劉涇古帖劉刮去字題曰李思訓易與趙叔盎今人好偽不好真使人歎息沈括存中家收周昉五星與丁氏一同以其淨處破碎遂隨筆剪却四邊帖於碧絹上成横軸使人太息王鞏字定國收李成雪景六幅清潤今歸林希字子中家又收唐竹圖著色亦好一横竹比他竹大麄也余家收唐人麻紙畫揚子雲腰下懸一兕觥細轉絛索蔣永仲收古銅兕觥其形勢骨髗凹凸全備轉旋絛索亦如余家畫遂以帖易去以證謂之子雲觥潤州甘露寺張僧繇四菩薩長四尺一板長八尺許又陸探微神面黄口角露二向上齒金甲手持幡下一白獅子神彩驚人殿梁天監中葢拱明間有二吳道子行脚僧吾移置行脚僧於淨名齋以避風雨已上並㑹昌中廢寺於本道合毁寺處移来於此寺其殿中置明皇銅像因得不廢元符末一旦為火所焚六朝遺物掃地江左更無一晉筆藏是六朝所書卷末晉王總持煬帝小字也平江南鳩集置寺題跋具存李衛公祠手植檜皆焚蕩寺後重重金碧參差多景樓面山背海為天下甲觀五城十二樓不過也所存惟衛公鐵塔米老庵二間余作詩悼之曰色政重重構春歸戸户嵐槎浮龍委骨畫失獸遺耽神䕶衛公塔天留米老庵栢梁終厭勝會副越人談榮咨道字詢之收雪獵圖命為王維不類張氏辟支佛所畫合掌象林本類蜀人筆雪山精好是唐物維則未也李冠卿少卿收雙幅大折枝一千葉桃一海棠一梨花一大枝上一枝向背五百餘花皆背一枝向面五百餘花皆面命為徐熈余細閲於一花頭下金書臣崇嗣上進公歎曰平生所好終被弟看破破除平生念矣今歸李莘老野夫家又收兩幅樓䑓甚古上有三十餘宫人唐装約略行筆髮彩生動又收六幅大龍旁畫龍王不知何人筆精彩動人云五郡祈輒雨易元吉徐熈後一人而已善畫草木葉心翎毛如唐徐後無人繼世但以獐猿稱可歎或云畫孝嚴殿壁畫院人妬其能只令畫獐猿竟為人鴆趙昌王友之流如無才而善佞士初甚可惡終須憐而收錄装堂嫁女亦不棄王端學闗仝人物益入俗元靄傳寫真有神彩孫知微作星辰多竒異不類人間所傳信異人也然是逸格造次而成平淡而生動雖清㧞筆皆不凡學者莫及然自有瓌古圓勁之氣畫龍有神彩不俗也楊朏學吳生㸃睛髭髮有意衣紋差圓尚為孫知㣲逸格所破武岳學吳有古意子洞清元作佛象羅漢善戰掣筆作髭髮尤工天人畫壁髮彩生動然絹素畫以粉㸃眼乆皆先落使人惜之南岳後殿壁天下竒筆江南劉常花氣格清秀有生意固在趙昌王友上傅古龍如蜈蚣董羽龍如魚趙叔盎家舊有出蟄圖江南畫魚蝦相随山石林木人物如董源龍不俗佳作也是龍吞珠圖曹仁熈水今古無及四幅圖内中心一筆長丈餘自此分去髙郵有水壁院長沙富民收水烏蘆花六幅圖乃唐人手妄題作韋偃押字後人題也古人圖畫無非勸戒今人撰明皇幸興慶圖無非奢麗吳王避暑圖重樓平閣動人侈心余嘗與李伯時言分布次第作子敬書練帬圖圖成乃歸權要竟不復得余又甞作支許王謝於山水間行自挂齋室又以山水古今相師少有出塵格者因信筆作之多烟雲掩映樹石不取細意似便已知音求者只作三尺横挂三尺軸惟寳晉齋中挂雙幅成對長不過三尺褾出不及椅所映人行過肩汗不著更不作大圖無一筆李成闗仝俗氣禮部侍郎燕穆之司封郎宋廸復古直龍圖閣劉明復皆師李成復古比二公特細秀作松枝而無向背荆楚細甚秀大夫蔣長源作著色山水頂似荆浩松身似李成葉取真松為之如靈鼠尾大有生意石不甚工作凌霄花纒松亦佳作嗣濮王宗漢作蘆雁有佳思余題詩曰偃蹇汀眠雁蕭梢風觸蘆京塵方滿眼速為喚花奴又曰野趣分苕水風光剪鑑湖塵中不作惡為有鄴公圖王詵學李成皴法以金碌為之似古今觀音寳陁山状作小景亦墨作平逺皆李成法也宗室令穰大年作小軸清麗雪景類世所收王維汀渚水鳥有江湖意蘇軾子瞻作墨竹從地一直起至頂余問何不逐節分曰竹生時何甞逐節生運思清拔出於文同與可自謂與文拈一瓣香以墨深為面淡為背自與可始也作成林竹甚精子瞻作枯木枝榦虬屈無端石皴硬亦怪怪竒竒無端如其胸中盤鬱也吾自湖南從事過黄州初見公酒酣曰君貼此紙壁上觀音紙也即起作兩枝竹一枯樹一怪石見與後晉卿借去不還朝議大夫王之才妻南昌縣君李尚書公擇之妹能臨松竹木石畫見本即為之難卒辨文與可每作竹貺人一朝士張迂疎修謹文作䊸竹以贈之如是不一又作横絹丈餘著色偃竹以貺子瞻南昌過黄借得以傚臨之後數年會余真州求詩非自陳不能辨也余曰偃蹇宜如季揮毫已逼翁衛書無曲妙琰惠有遺工乍覩虬如物初披颯有風顧藏唯謹鑰化去或難窮章友直字伯益善畫龜虵以篆筆畫亦有意又能以篆筆畫棋盤筆筆相似其女並能之杭僧真慧畫山水佛像近世出品惟翎毛墨竹有江南氣象寫大牛大數尺形似虎艾宣張涇寳覺大師翎毛蘆雁不俗寳覺畫一鶴王安上純甫見以謂薛稷筆取去印湘見畫即摹無不亂真杭士林生作江湖景蘆雁水禽氣格清絶南唐無此畫可並徐熈在艾宣張涇寳覺之右人罕得之大抵畫今時人眼生者即以古人向上名差配之似者即以正名差配之好事者與賞鑒之家為二等賞鑒家謂其篤好遍閲記錄又復心得或自能畫故所收皆精品近世人或有貲力元非酷好意作摽韵至假耳目於人此謂之好事者置錦囊玉軸以為珍祕開之或笑倒余輒撫案大呌曰慙惶殺人王詵每見余作此語亦常常道後學與曹貫道貫道亦甞道之每見一可笑必曰米元章道慙惶殺人至書啟間語事每用之大抵近世人所收多可贈此語也余老矣每求新賞與賞鑑之家博易書畫最多不一一記上多有印記可辨無非竒筆萬金之玩自付識者擊節不為好事道鍾離景伯字公序收燕公畫一幅題曰禮部侍郎燕穆之畫付女五娘氣格如此王琪字君玉收王維畫堯民鼔腹圖劉涇巨濟收唐人畫脱殻筍如生錢藻字醇老收張璪松一株下有流水澗松上有八分詩一首斷句云近溪幽溼處全藉墨烟濃又有璪答詩在大夫孫載家古書畫皆圜葢有助於器晉唐皆鳯池研中心如瓦凹故曰研瓦如以一花頭瓦安三足爾墨稱螺製必如蛤粉此又明用凹研也一援筆因凹勢鋒已圓書畫安得不圜本朝研始心平如砥一援筆則褊故字亦褊唐詢字彦猷始作𨫼心凸研云宜㸔墨色每援筆即三角字安得圜哉余稍追復其様士人間有用者然稍平革𨫼背未至於瓦惟至交一兩人頓悟者用之矣亦世俗不能發藥也坦然明白易辨者顧陸吳周昉人物滕邊徐唐祝花竹翎毛荆李闗董范巨然劉道士山水也戴牛曹韓馬韋馬亦復難辨葢相似衆也今人畫亦不足深論趙昌王友鐔黌輩得之可遮壁無不為少程坦崔白侯封馬賁張自芳之流皆能汙壁茶坊酒店可與周越仲翼草書同挂不入吾曹議論得無名古筆差排猶足為尚友端州有陳髙祖之後收陳世諸佛帝真白畫唐使下御史姓韋作記頂幅巾不冠後主作醉舞状蘇泌家有巨然山水平淡竒絶蘇洎字及之家有徐熈四花其家故物蘇汶字達復有江南暝禽圖徐熈一酸榴余家有丁晉公所收甜榴滕中孚元直有徐熈對花果子四軸石揚休有吾家唐畫韋侯故事六横幅山水人物車馬備具後人題作張萱易李邕帖衆物之一也并徐熈牡丹海棠兩幅也余家收古畫最多因好古帖每自一軸加至十幅以易帖大抵一古帖不論貲用及他犀玉瑠璃寳玩無慮十軸名畫其上四角皆有余家印記見即可辨余家晉唐古帖千軸葢散一百軸矣今惟絶精只有十軸在有竒書亦續續去矣晉畫必可保葢緣數晉物命所居為寳晉齋身到則挂之當世不復有矣書畫不可論價士人難以貨取所以通書畫博易自是雅致今人收一物與性命俱大可笑人生適目之事看乆即厭時易新玩兩適其欲乃是逹者余家最上品書畫用姓名字印審定真迹字印神品字印平生真賞印米芾祕箧印寳晉書印米姓翰墨印鑒定法書之印米姓秘玩之印玉印六枚辛卯米芾米芾之印米芾氏印米芾印米芾元章印米芾氏已上六枚白字有此印者皆絶品玉印唯著於書帖其他用米姓清玩之印者皆次品也無下品者其他字印有百枚雖參用於上品印也自畫古賢唯用玉印馮永功字世勣有日本著色山水南唐亦命為李思訓蘇澥浩然處見壽州人摹明皇幸蜀道圖人物甚小云是李思訓本與宗室仲忽本不同黄筌畫不足收易摹徐熈畫不可摹蘇子美黄筌鶺鴒圖只蘇州有三十本更無少異今院中作屏風畫用筌格稍舊退出更無辨處王晉卿昔易六幅黄筌風牡丹圖與余後易白戴牛小幅于才翁子鴻字逺復上有太宗御書戴嵩牛三字其後浙中所在屏風皆是此牡丹圖更無辨葢帖屏風易破故也後牛易懐素絹帖及陸機衛恒等摹晉帖與數種同歸劉涇又甞王晉卿以韓馬照夜白題曰王侍中家物以兩度牒置易顔書朱巨川告于余劉以硯山一石易馬去及得白牛始自喜以為有韓馬戴牛然但少杜荀鶴章得象耳劉既作歌曰元章好古過人書畫驚世起余作歌云天下愛竒人沒量竒不諛人竒解相竒人竒物方合璧乞與世間人物樣六朝唐盛始兼得訪古知名已蕭爽人亡物喪付衰夢注想後来逢好尚元章心自鑒秋月一路仍行九霄上家時菜色無斗粟書畫竒竒世人望譬如大海沈百寳爾輩乘風得之浪二王褚陸已天作老顧如来更天匠其餘緹襲凡㡬重但見光明爛垂象珍犀瑞錦扶蘭茝龍躍鸞驚訶魍魎金仙詎敢觸以手雪子玉人聊置掌余家僻素最沈著退舍還師覺難旁世人往往力能幹未免目蝦終惚恍緘機偽謬各臣妾未覩堂堂筆中王袖間澀縮氣如線淨几明窗謾瞻仰從来所有萬錢價不即臭帑當火葬傾心妙絕豈求勝妄意臨摹須殺謗端居自號書一品好事如封繪三藏諸郎青出即䕶持未肯充飢謬為駔書史載薛道祖詩云寧馨動破千金資是也余衰二物擬髙閣子可專之世無兩書来詩往但悠悠塵土欺人正惆悵余答云劉郎收畫早甚卑折枝花草首徐熈十年之後始聞道取吾韓戴為神竒邇来白首進道奥學者信有髓與皮始知什襲但遮壁牛馬便可裹弊帷峩峩太平老寺主白紗帽首無冠蕤武士後列肅大劒宮女旁侍顰脩睂神清眸子知寡欲齒露脣反法定飢世人見服似摩詰不知六朝居士衣後人勿把亂唐突梁時筆法了可知道子見之必再拜曹劉何物望藩籬本當第一品天下却緣顧筆在漣漪時初報余得梁武帝象此象今在仲忽處魏泰字道輔有徐熈澄心堂紙畫一飛鶉如生智永真草歸田賦竒物也范大珪有富公家折枝梨花古筆非江南蜀畫蘇舜欽子美家有畢宏一幅山水竒古題數行云筆勢凶險是也王敏甫收李重光四時紙上横卷花一軸每時則自寫論物更謝之意文一篇畫一幅字亦少時作花清麗可愛江南周文矩士女面一如昉衣紋作戰筆此葢布文也惟以此為别昉筆秀潤匀細沈括存中收唐人壁畫兩大軸或一手一面或半身是學者記其難處遂題為真蘇洎及之處收古茴香一枝耆字國老題為閻令畵寳月所收李成四幅路上一才子騎馬一童隨清秀如王維畫孟浩然成作人物不過如是他圖畫人醜怪賭博村野如伶人者皆許道寜專作成時畫李公麟云海州劉先生收王獻之畫符及神一卷咒小字五斗米道也李伯時只一見求摹不許其子居金陵與王荆公連袂陳元輿帥金陵余託訪之云乆為一貴人取去竟不知誰何蔣永仲收韋侯松一幅千枝萬葉非經歳不成鱗文一一如真筆細圓潤梅澤有張璪澗底松葛氏物余託購乃自取之古畫至唐初皆生絹至吳生周昉韓幹後来皆以熱湯半熟入粉搥如銀板故作人物精彩入筆今人收唐畫必以絹辨見文麄便云不是唐非也張僧畫閻令畫世所存者皆生絹南唐畫皆麄絹徐熈絹或如布装背畫不須用絹補破處用之絹新時似好展卷乆為硬絹抵之却於不破處破大可惜古書人惜其字故行間勒作痕其字在筒瓦中不破今人得之却以絹或絹背帖所勒行一時平直良乆於字上裂大可惜也紙上書畫不可以絹背雖熟絹新終硬文縷磨書畫面上成絹紋葢取為骨乆之紙毛是絹所磨也用背紙書畫日月損磨墨色在絹上王晉卿舊亦以絹背書初未信乆之取桓温書看墨色見磨在紙上而絹紋透紙始恨之乃以歙薄一張葢而收之其後不用絹也絹素百片必好畫文製各有辨長幅横卷裂文横也横卷直裂裂文直各隨軸勢裂也直斷不當一縷歳乆卷自兩頭蘇開斷不相合不作毛搯則蘇也不可偽作其偽者快刀直過當縷兩頭依舊生作毛起搯又堅紉也濕染色棲縷間乾薫者烟臭上深下淺古紙素有一般古香也劉子禮以一百千買錢樞宻家畫五百軸不開看直交過錢氏喜既交畫只一軸盧鴻自畫草堂圖已直百千矣其他常筆固多也小八分詩句帶筆如行草竒甚今無此體宗室君發以七百千置閻立本太宗步輦圖以熟絹通身背畫經梅便兩邊脫磨得畫面蘇落文彦博以古畫背作匣意在寳惜然貼絹背著綳損愈疾今人屏風俗畫一二年即斷裂恰恰蘇落也匣是收壁畫製書畫以時卷舒近人手頻自不壊歳乆不開者隨軸乾斷裂脃黏補不成也王球字䕫玉有兩漢而下至隋古帝王象云形状有怪甚者恨未見之此可訪為秘閣物也檀香辟濕氣畫必用檀軸有益開匣有香而無糊氣又辟蠹也若玉軸以古檀為身檀身重今却取兩片刳中空合柄軸鑿乃輕輕不損畫常卷必用桐杉佳也軸重損絹軸不宜用金銀既俗且招盜若桓靈寳不然水晶作軸挂幅必兩頭墜性重蜀青圓錢雙鶯錦最俗不可背古畫只背今人装堂亦俗也蘇木為軸以石灰湯轉色歳乆愈佳又性輕角軸引蟲又開軸多有濕臭氣檀犀同匣共發古香紙素既古自有古香也范寛山水嶪嶪如恒岱逺山多正面折落有勢晚年用墨太多土石不分本朝自無人出其右溪出深虚水若有聲其作雪山全師世所謂王摩詰王士元山水作漁村浦嶼雪景類江南畫王鞏定國收四幅後與王晉卿命為王右丞矣趙叔盎伯充處有摹本余以范寛圖易僧夢休雪竹一幅巨石倒影下落葉數片浮水上旁一枯木亦倒影後易韋馬于蔣長源凡去十一種物方得蔣後易與王詵今蔡勝道有六幅長丈餘竒甚大屋梁方可挂森森如坐竹下濮州李文定丞相家畫三等上等書名用名印中等書字用字印下等亦用字印押字而已及收鍾王迹甚多未得見江東漕李孝廣字世美處有鍾王迹甞於金陵重背拆下背紙乃硾熟唐人門刺其孫奉世語余如此近官太常遂得見王冀公家書畫用太原欽若圖書品少精者余甞於蔣氏得此鍍金大印劉巨濟借未還大年收得南唐集賢院御書印乃墨用于文房書畫者大年收古絹本横卷經書畫皆精過于當時西昇經馮京當世託王定國背西昇經其古絹紙背四五分透别装作一卷道士牛戩筆墨麄豪縱放亦不俗格固在艾宣惠崇寳覺張經之上也李甲華亭逸人作逸筆翎毛有意外趣木不佳范大珪字君錫富鄭公壻同行相國寺以七百金常賣處買得雪圖破碎甚古如世所謂王維者劉伯玉相值笑問買何物因衆中展示伯玉曰此誰筆余曰王維伯玉曰然適行一遭不見豈有所歸乎余假范人持之良乆并范不見翌日去取云已送西京背同行梅子平大怒曰吾證也可理於官豈有此理余笑曰吾故人也因以贈之今二十年矣范卒已十年不知所在趙叔盎收張璪松石一軸李公炤家物已破糜不可重背葉助字天祐收蜀范瓊畫梁武帝寫誌公圖一幅武帝白冠衣褐晉尚白宋齊梁陳習見不同各以所尚色皆白㡌帝首叔季文物如此豈非餘分國位乎顧凱之畫維摩猶白首周木徳冕皆尚青仲尼曰吾殷人也生於宋故服章甫之冠此殷制殷水徳故尚𤣥𤣥端章甫皆黑色也封二王後各行其正朔服其文物也漢火德尚赤用赤幘舜土徳尚黄故服黄冠圖宜觸類而長之乃不凡王通元經書晉宋齊梁陳亡有餘意也江南陳常以飛白筆作樹石有清逸意人物不工折枝花亦以逸筆一抹為枝以色亂㸃花欲奪造化本朝妙工也鄒極大夫有之池州匠作秋浦九華峯有清趣師董源髙公繪字君素又有張璪澗底松山上苖山水一軸唐韓幹圖于闐所進黄馬一軸馬翹舉雄傑余感今無此馬故賦云方唐牧之至盛有天骨之超俊勒四十萬之數而隨方以分色焉此馬居其中以為鎮目星角而電發蹄捥踣以風迅鬐龍顒以孤起耳鳳聳而雙峻翠華建而出步閶闔下而輕噴低駑羣而不嘶横秋風以獨韵若夫躍溪舒急冒絮征叛直突則建徳項縶横馳則世充領斷皆絶材以比徳敢伺蹶以致吝豈肯浪逐苜蓿之坡葢當下視八坊之駿髙標雄跨而獅子攘獰逸氣下衰而照夜矜穏於是風靡格頹色妙才駘入仗不動終日如坯乃得玉為銜飾繡作鞍儓棗抹粟豢肉脹筋埋其報徳也葢不如偷盧噬盜策蹇勝柴鑄黄蝸而吐水畫白澤以除災但覺駞垂就節鼠伏防猜怒雖甚厲馴號斯諧誓俛首以畢世未伏櫪以興懐嗟乎所謂英風頓盡冗仗髙排若不市駿骨致龍媒如此馬者一旦天子廵朔方升喬嶽掃四夷之塵較岐陽之獵則飛黄腰褭躡雲追電何所從而遽来又有唐蜀中畫雪山世以為王維也劎門闗圖雪景五代筆也又有唐畫山水雙短幅徐熈海棠雙幅二軸江南装堂畫富艶有生意趙叔盎亦有一軸王晉卿收江南畫小雪山二軸易余歳餘小木一筆纒起作枝葉如草書不俗後易書與蘇之友李伯時云其父所收失去知在晉卿家不知歸余恨不得易云王維筆非也余收易元吉逸色筆作蘆如真上一鸜鵒活動晉卿借去不歸徐熈風牡丹圖葉㡬千餘片花只三朶一在正面一在右一在衆枝亂葉之背石竅圓潤上有一猫兒余惡畫猫數欲剪去後易研與唐林夫蔣長源以二十千置黄筌畫狸猫顫葧荷甚工薛紹彭道祖有花下一金盆盆旁鵓鳩謂之金盆鵓鳩豈是名畫可笑又收吳王斫鱠圖江南衣文金冠右袵紅衫大榻上背擦兩手吳王衣不當右袵濟州破朱浮墓有石壁上刻車服人物平生隨品所乘曰府君作令時車是曲轅駕一馬車輪略離地上一葢坐一人三梁冠面與馬尾平對自執綏馬有帬遮其尾一人御又曰作京兆尹時四馬轅小曲車差髙葢下坐儀衛多有曰鮮明隊又某隊隊十人騎馬作一隊内一隊背持鐃多不能紀也從者皆冠唐人輭裹葢禮樂闕則士習賤服以不違俗為美余初惑之當俟君子留意耆舊言士子國初皆頂鹿皮冠弁遺制也更無頭巾掠子必帶箆所以裹帽則必用箆子約髪客至即言容梳裹乃去皮冠梳髮角加後以入幞頭巾子中箆約髮乃出客去復如是其後方有絲絹作掠子掠起髮頂帽出入不敢使尊者見既歸於門背取下掠子箆約髮訖乃敢入恐尊者令免帽見之為大不謹也又其後方見用紫羅為無頂頭巾謂之額子猶不敢習庶人頭巾其後舉人始以紫紗羅為長頂頭巾垂至背以别庶人黔首今則士人皆戴庶人花頂頭巾稍作幅巾逍遙巾額子則為不敬衣用裹肚勒帛則為是近又以半臂軍服被甲上不帶者謂之背子以為重禮無則為無禮不知今之士服大帶拖紳乃為禮不帶左袵皆夷服此必有君子制之矣漢制從者巾與殷毋追同今頭巾若不作花頂而四帶兩小者在髪兩差大者垂則此制也禮豈有他君子制之耳余為漣水古徐州境每民去巾下必有鹿楮皮冠此古俗所著良足美也又唐初畫舉人必鹿皮冠縫掖大袖黄衣短至膝長白裳也蕭翼御史至越見辯才云著黄衣大袖如山東舉子用證未軟裹曰襴也李白像鹿皮冠大袖黄袍服亦其制也又有麟鳳圖半篆半𨽻以九字九行為率云惟永建元年秋十月饗時山陽太守河内孫君見碑不合禮掾重造記初瑞象麟鳯其銘辭曰漢威徳中興即政二年辛酉之節首歴四十青龍起云云三月季春爰易立碑石順禮典文九九度數萬世常存又一云天有竒鳥名曰鳳凰時下有徳民富國昌黄龍嘉禾皆不隠藏漢徳巍巍永布宣揚天有竒獸名曰麒麟時下有徳安國富民忠臣竭節義以修身聞愆求善明明我君不知九字九行之數合何典必有識者麟鳳状一角直上髙如足翹如惡馬鳳冠髙尾長甚可怪也余題曰非篆非科璞已彫形容振振與蕭蕭曾因忠厚方周徳坐想訏謨覽舜韶漢徳已衰還應孽魯邦既弱不為妖虚齋自是驚人玩不勝雄狐逐怒鵰嘉祐中一貴人使江南攜韓馬一匹行及囘渡采石磯風大作三日不可過欲過又大作於是禱於中元水府廟典祀也是夕夢神告留馬當相濟翌日詣廟獻之風止乃渡至今典於廟中因知天才神不能化天生是物自然而生自乘秀氣而成才也天不能資神不能化所以玉樓成必李賀記也蘇耆少子風神如畫目如㸃漆面如凝脂天男相畫不及有器度好學一旦相國寺遇其兄問安否曰已不幸吾曰豈神奪之乎君大驚曰一旦夢嫁其妻而議婚心惡之又一旦夢神迎婚禮因得疾醫曰不可治翌日卒公非神人也何從知之有吳中一士大夫好畫而装背以舊古為辨仍必以名畫記差古人名嘗得一七元題云梁元帝畫也又得一伏羲畫卦象題云史皇畫也問所自答云得於其孫了不知軒轅孫史皇孫也若是史皇孫必於戾園得之其他畫稱是甞見余家顧凱之維摩更不論筆法便云若如此近世畫甚易得顧侍史曰明日教胡常賣尋兩夲後數日果有兩凡俗本即題曰顧凱之維摩陸探微維摩題顧凱之者無文殊只一身是曽見瓦棺象者也其一有文殊睡獅子故曰陸探微曾見甘露陸探微有張目獅子故也此收章得象杜荀鶴之流其兄有鑒别曰舍弟極損終與一日燒了㑹其先化不然梁元帝又夢秦始皇也士流當以此為戒其物不必多以百軸之費置一軸好畫不為費以五鐶價置一百軸繆畫何用黄卷五經赤軸三史猶有俟於抄錄若如此佛畫止可渡江投水府也漣漪藍氏收晉畫渾天圖直五尺素畫不作圜勢别作一小圏畫北斗紫極亦易於㸃閲又列位多異於常圖余常作天説以䆒天地日月旁側之形盈虧之質作成晝夜圖六十本因得究潮候大小又為晝夜六十圖所引六經以黜古今百家星厯之妄説又著潮説以證盧肇皮日休之緣飾釋氏假佛之詭論将上之御府藏之名山餘杭刻印五聲音六律十二宫旋相為君圖極精微夫五音之聲出於五行自然之理管仲深明其要著其形似太平之具也作樂之道必自此始沈隠侯只知四聲求其宫聲不得乃分平聲為二以欺後學㡬於千年無人辨正愚陋之人從而祖述作為字母謹守前説陸徳明亦復吳音傳其祖説故以東冬為異中鍾為别以象為奨以上為賞因其吳音以聾後學莫之為正余於是以五方立五行求五音乃得一聲於孟仲季位因金寄土了然明白字字調聲五音皆具削去平上去入之號表以宫商角徴羽之名有聲無形互相假借千歳之後疑互判清太初漏露神姦鬼祕無所逃形著云大宋五音正韵用以制律作樂能召太和致太平藏之名山百世以俟與我同志者不徒為䝉陋生設也鑒閲佛像故事圖有以勸戒為上其次山水有無窮之趣尤是烟雲霧景為佳其次竹木水石其次花草至於士女翎毛貴游戯閲不入清玩李文定孫奉世子孝端字師端收薛稷二鶴唐李昇著色畫二軸三幅山水舟舫小人物精細兩幅畫林石岸茅亭溪水數道士閑適人物差大反不工於小者石岸天成都無筆蹤其三幅峯巒秀拔山頂蒙茸作逺林巖巒洞穴松林層際木身圓挺都無筆蹤其二度非歳月不可了一畫人間未見其如此之細且工雖太宻茂林中不虛而種種木葉古未有倫今固無有與余得於丁氏者無以異也雒陽張状元師得家多名畫其姪孫南都倅兟字茂宗處見唐畫嵇康廣陵散松石逺岸竒古所書故事空民字世未見同品畫真佳作也黄筌六幅著色山水有江南徐崇嗣桃六幅折枝江南周文矩士女徐熈鯿魚蟹皆有丁晉公親題印餘畫皆張状元及景儉字印李成淡墨如夢霧中石如雲動多巧少真意范寛勢雖雄傑然深暗如暮夜晦暝土石不分物象之幽雅品固在李成上闗仝麄山工闗河之勢峯巒少秀氣董源峯頂不工絶澗危徑幽壑荒迥率多真意巨然明潤鬱葱最有爽氣礬頭太多荆浩善為雲中山頂四面峻厚王球夔玉家古帝王像後一年余於畢相孫仲荀處見白麻紙不装像云楊褒甞摹去乃䕫玉所購上有之美印記趙叔盎云線褊絛闊指半絲細如綿者作畫帶不生毛以刀刺褾中間絲縷間套挂褾後卷即縛之又不在畫心省損畫無摺帶隠痕尋常畫多中損者縛破故也書多腰損亦然略略縛之烏用力宗室仲儀收古廬山圖一半㡬是六朝筆位置寺基與唐及今不同石不皴林木格髙挽舟人色舟製非近古今所惜不全也畢仲欽家有荆浩山水一軸畢仲游家有六軸闗仝畫王欽臣長子有六幅闗仝古本特竒董源四幅真意可愛刁約家有董源霧景四軸林虞家有王維六幅雪圖董源八幅李成雪圖余家收紙本曹不興畫如意輪一軸嘉祐中三人收畫楊褒邵必石揚休皆酷好竭力收後余閲三家畫石氏差優楊以四世五公字印號之無一軸佳者邵印多巧篆字其旁大略標位髙略似江南畫即題曰徐熈蜀畫星神便題曰閻立本王維韓滉皆可絶倒其孫攜韓滉散牧圖至乃雙幅上驢二十餘枚不及崔白輩絹素染深黄絲文總緊索價四百貫面上左以粉作牌子題曰韓晉公散牧圖不疑家寳其上一印鎮江軍節度使印是油單印者其大四寸許文麄下一印只略有唐印最小又文細諸人共笑其偽乆之無人信遂以五十千質與江氏而去因嗟之曰華堂之上清晨一羣驢子厮咬是何氣象潁州公庫顧凱之維摩百補是唐杜牧之摹寄潁守本者置在齋龕不攜去精彩照人前後士大夫家所傳無一毫似葢京西工拙其屏風上山水林木竒古坡岸皴如董源乃知人稱江南葢自顧以来皆一樣隋唐及南唐至巨然不移至今池州謝氏亦作此體余得隋畫金陵圖於畢相孫亦同此體余因題其顧畫幅上云米芾審定是杜牧之本仍以撥發司印印之葢證勾諶刻石妄指為人易去也余與潁簽善託尋善工摹須切記似凡三寄蠟本無一筆似者或可上之御府乞國工摹賜世間為千年之傳如唐文皇蘭亭豈非一代盛美真絹色淡雖百破而色明白精神彩色如新惟佛像多經香烟薰損夲色染絹作濕香色棲塵紋間最易辨仍葢色上作一重古破不直裂須連兩三經不可偽作薛紹彭家三天女謂之顧凱之實唐初畫邵必家維摩文殊六朝畫西山十二真君亦其次題為閻立本余相國寺中八金得紙桃兩枝綠葉蟲透背二葉著桃上二桃突兀髙出紙素徐熈真筆也錢世京家謝靈運盤足坐像亦竒古髙公繪家古花二枝百破碎無名在徐黄上自余家往江州張氏收李重光道装象神骨俱全云是顧宏中筆沈括收畢宏畫兩幅一軸上以大青和墨大筆直抹不皴作柱天髙半峰滿八分一幅至向下作斜鑿開曲欄約峻崕一瀑落下兩大石塞路頭一幅作一圓平生半腰雲遮下磧石數塊一童抱琴由曲欄轉山去一古木臥竒石竒古沈謫秀日見之及居潤問之云已易與人竟不再出至今常在夢寐畫史
