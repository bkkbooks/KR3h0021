body:
  text: 提要畫史藝術類一書畫之屬臣等謹案畫史一卷宋米芾撰芾字元章史浩兩鈔摘腴曰芾自號鹿門居士黄溍筆記曰元章自署姓名米或為􅇗芾或為黻又稱海岳外史又稱襄陽漫仕周必大平園集有章友直畫蠧跋曰後題無礙居士即米元章盖芾性好竒故屢變其稱如是宋史本傳作吳人誤也芾初以其母侍宣仁后藩邸舊恩補浛光尉官至禮部員外郎知淮南軍史稱其妙於翰墨繪畫自名一家尤精鑒裁此書皆舉其生平所見名畫品題真偽或間及裝禙收藏及考訂譌謬厯代賞鑑之家奉為圭臬中亦有未見其畫而載者如王球所藏兩漢至隋帝王像及李公麟所説王獻之畫之類盖芾作書史皆所親見作寳章待訪錄别以目睹的聞分類編次此則已見未見相雜而書其體例各異不嫌並存也書史藝術類一書畫之屬臣等謹案書史一巻宋米芾撰是編評論前人真蹟皆以目厯者為斷故始自西晉迄於五代凡印章跋尾紙絹裝禙俱詳載之中如言叙帖辨為右軍書而斥栁公權之誤作子敬智永千文騐為鍾紹京歐陽詢書魏泰收虞世南草書則又定為智永作類皆辨别精㣲不爽錙黍所錄詩文亦多出於聞見之外如許渾詩湘潭雲盡暮山出句此載渾手寫烏絲欄墨蹟内暮山實作暮烟知今世所行丁夘集本為誤楊慎作丹鉛錄嘗攘其説而諱所自來是亦足資考證不但為鑒賞翰墨之資也惟巻末論私印一條謂印闗吉凶厯引當時三省印御史臺印宣撫使印皆以篆文字畫卜官之休咎考隋書經籍志有魏征東將軍程申伯相印法一巻三國志注夏侯尚傳末附許允相印事引相印書曰相印法本出陳長文以語韋仲將印工楊利從仲將受法以語許士宗案士宗即許允之字利以法術占吉凶十可中八九仲將又問長文從誰得法長文曰本出漢世有相印相笏經又有鷹經牛經馬經印工宗養以法語程申伯於是有一十二家相法是古原有此術然芾未必能得其傳殆亦謬為附會徒為好異而已矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
